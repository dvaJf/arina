<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Арина!💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ff6b8a;
            --gold-light: #ff8fa3;
            --gold-dark: #d64d6a;
            --purple: #ff6b8a;
            --purple-light: #ffb3c6;
            --pink: #ff6b8a;
            --deep: #ffe0e6;
            --card-bg: rgba(255,200,210,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            font-family: 'Raleway', sans-serif;
            overflow-x: hidden;
            background: #ffe0e6;
            cursor: none;
        }

        /* ─── CUSTOM CURSOR ─── */
        .cursor {
            position: fixed;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #ff6b8a;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s, width 0.2s, height 0.2s;
            box-shadow: 0 0 20px #ff6b8a, 0 0 40px #d64d6a;
            mix-blend-mode: screen;
        }
        .cursor-trail {
            position: fixed;
            width: 8px; height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            animation: trailFade 0.8s ease-out forwards;
        }
        @keyframes trailFade {
            from { opacity: 0.8; transform: translate(-50%,-50%) scale(1); }
            to   { opacity: 0; transform: translate(-50%,-50%) scale(0); }
        }

        /* ─── STARS BACKGROUND ─── */
        .stars {
            position: fixed; inset: 0;
            pointer-events: none; z-index: -1;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: #ff8fa3;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50%       { opacity: 1;   transform: scale(1.2); }
        }

        /* ─── CONTAINER ─── */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative; z-index: 1;
        }

        /* ─── GIFT BOX ─── */
        .scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .gift-wrap {
            position: relative;
            cursor: none;
            user-select: none;
        }

        .gift-box {
            position: relative;
            width: 200px; height: 200px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 20px 60px rgba(255,100,130,0.5));
        }
        .gift-wrap:hover .gift-box { transform: scale(1.04) translateY(-4px); }
        .gift-wrap:active .gift-box { transform: scale(0.97); }

        /* Base */
        .box-base {
            position: absolute;
            bottom: 0; left: 0;
            width: 200px; height: 155px;
            background: linear-gradient(145deg, #ff6b8a 0%, #ff6b8a 60%, #d64d6a 100%);
            border-radius: 12px 12px 16px 16px;
            box-shadow: inset 0 -8px 20px rgba(0,0,0,0.3), inset 0 8px 16px rgba(255,150,170,0.4);
        }
        .ribbon-v {
            position: absolute;
            left: 50%; transform: translateX(-50%);
            width: 40px; height: 155px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
            border-radius: 4px;
        }
        .ribbon-h {
            position: absolute;
            top: 55px; left: 0;
            width: 200px; height: 40px;
            background: linear-gradient(180deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
        }

        /* Lid */
        .box-lid {
            position: absolute;
            top: 0; left: -8px;
            width: 216px; height: 68px;
            background: linear-gradient(145deg, #ff8fa3, #ff6b8a, #ff6b8a);
            border-radius: 14px 14px 0 0;
            transform-origin: bottom left;
            transition: transform 0.9s cubic-bezier(0.68,-0.55,0.265,1.55);
            box-shadow: inset 0 6px 20px rgba(255,255,255,0.15), 0 -4px 20px rgba(0,0,0,0.2);
            z-index: 2;
        }
        .lid-ribbon {
            position: absolute;
            left: 50%; transform: translateX(-50%);
            width: 40px; height: 68px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
            border-radius: 6px 6px 0 0;
        }
        .bow {
            position: absolute;
            top: -38px; left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }
        .bow-loop {
            position: absolute;
            width: 48px; height: 38px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            border-radius: 50%;
            box-shadow: inset 0 4px 10px rgba(255,255,255,0.5);
        }
        .bow-loop.left  { left: -34px; transform: rotate(-35deg); }
        .bow-loop.right { right: -34px; transform: rotate(35deg); }
        .bow-center {
            position: absolute;
            left: 50%; top: 8px;
            transform: translateX(-50%);
            width: 22px; height: 22px;
            background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dark));
            border-radius: 50%;
            box-shadow: 0 2px 12px rgba(255,100,130,0.9);
        }

        /* open state */
        .gift-box.opened .box-lid { transform: rotate(-130deg) translateY(-15px); }
        .gift-box.shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%,100%{ transform:rotate(0); }
            20%{ transform:rotate(-12deg); }
            40%{ transform:rotate(12deg); }
            60%{ transform:rotate(-6deg); }
            80%{ transform:rotate(6deg); }
        }

        /* inside */
        .heart-inside {
            position: absolute;
            top: 18px; left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 64px; opacity: 0;
            transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.4s;
            z-index: 1;
        }
        .gift-box.opened .heart-inside { transform: translateX(-50%) scale(1); opacity: 1; }

        /* hint */
        .hint {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: #ff6b8a;
            text-shadow: 0 0 20px #ff6b8a;
            animation: hintPulse 2.2s ease-in-out infinite;
            letter-spacing: 1px;
        }
        @keyframes hintPulse {
            0%,100%{ opacity:0.5; transform:translateY(0); }
            50%{ opacity:1; transform:translateY(-6px); }
        }

        /* floating hearts around box */
        .floating-hearts { position:absolute; inset:0; pointer-events:none; }
        .fh {
            position:absolute; font-size:22px;
            animation: floatH 3.5s ease-in-out infinite;
            opacity:0.75;
        }
        @keyframes floatH {
            0%,100%{ transform:translateY(0) scale(1); }
            50%{ transform:translateY(-22px) scale(1.2); }
        }

        /* ─── GREETING CARD ─── */
        .greeting {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 100;
        }
        .greeting.visible { opacity: 1; pointer-events: auto; }

        .card {
            position: relative;
            background: linear-gradient(135deg, rgba(255,120,150,0.22) 0%, rgba(255,100,130,0.15) 50%, rgba(255,150,170,0.1) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 48px 36px 40px;
            max-width: 580px; width: 100%;
            text-align: center;
            border: 1.5px solid rgba(255,100,130,0.5);
            box-shadow: 0 0 80px rgba(249, 147, 167, 0.35), 0 30px 60px rgba(251, 127, 127, 0.4), inset 0 1px 0 rgba(255,200,210,0.6);
            transform: scale(0.7) translateY(60px);
            transition: transform 0.9s cubic-bezier(0.34,1.56,0.64,1);
            overflow: hidden;
        }
        .greeting.visible .card { transform: scale(1) translateY(0); }

        /* shimmer line top */
        .card::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
            animation: shimmerLine 3s ease-in-out infinite 1s;
        }
        @keyframes shimmerLine {
            0%   { left: -60%; }
            100% { left: 160%; }
        }

        /* name tag */
        .name-tag {
            display: inline-block;
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff8fa3 0%, #ff6b8a 40%, #d64d6a 70%, #ff8fa3 100%);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerText 3s linear infinite;
            text-shadow: none;
            line-height: 1.1;
            letter-spacing: -1px;
        }
        @keyframes shimmerText {
            0%  { background-position: 0% center; }
            100%{ background-position: 200% center; }
        }

        .title-row {
            margin-bottom: 6px;
        }
        .subtitle {
            font-family: 'Raleway', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #d64d6a;
            opacity: 0;
            margin-bottom: 28px;
            animation: fadeUp 0.7s ease forwards;
            animation-delay: 0.6s;
        }
        .greeting.visible .subtitle { opacity: 1; }

        .title-happy {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: rgba(120,20,50,0.8);
            font-weight: 400;
            margin-bottom: 4px;
            display: block;
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.6s ease;
        }
        .greeting.visible .title-happy { opacity:1; transform:translateY(0); transition-delay:0.3s; }

        /* cake */
        .cake-emoji {
            font-size: 3.5rem;
            display: block;
            margin: 8px 0 20px;
            animation: cakeBounce 1.6s ease-in-out infinite;
        }
        @keyframes cakeBounce {
            0%,100%{ transform: scale(1) rotate(-3deg); }
            50%    { transform: scale(1.12) rotate(3deg); }
        }

        /* message lines */
        .msg {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            line-height: 1.85;
            color: rgba(120,20,50,0.9);
            font-style: italic;
            margin-bottom: 28px;
        }
        .line {
            display: block;
            opacity: 0;
            transform: translateY(18px);
            transition: all 0.55s ease;
        }
        .greeting.visible .line { opacity:1; transform:translateY(0); }
        .greeting.visible .line:nth-child(1){ transition-delay:0.8s; }
        .greeting.visible .line:nth-child(2){ transition-delay:1.0s; }
        .greeting.visible .line:nth-child(3){ transition-delay:1.2s; }
        .greeting.visible .line:nth-child(4){ transition-delay:1.4s; }
        .greeting.visible .line:nth-child(5){ transition-delay:1.6s; }
        .greeting.visible .line:nth-child(6){ transition-delay:1.8s; }

        /* deco row */
        .deco { font-size: 1.8rem; letter-spacing: 8px; margin: 10px 0 18px; }

        /* signature */
        .sig {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            font-style: italic;
            background: linear-gradient(90deg, #d64d6a, #ff6b8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transition: opacity 0.8s ease 2s;
        }
        .sig1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            font-style: italic;
            background: linear-gradient(90deg, #d64d6a, #ff6b8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .greeting.visible .sig { opacity:1; }

        /* glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.2;
            pointer-events: none;
        }
        .orb1 { width:200px; height:200px; background:var(--purple); top:-60px; left:-60px; }
        .orb2 { width:160px; height:160px; background:var(--pink); bottom:-40px; right:-50px; }
        .orb3 { width:120px; height:120px; background:var(--gold); bottom:20px; left:20px; }

        /* ─── FIREWORK ─── */
        .firework { position:fixed; pointer-events:none; z-index:200; }
        .fw-p {
            position:absolute; width:6px; height:6px;
            border-radius:50%;
            animation: fwExplode 0.9s ease-out forwards;
        }
        @keyframes fwExplode {
            0%  { transform:translate(0,0) scale(1); opacity:1; }
            100%{ transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; }
        }

        /* ─── CONFETTI ─── */
        .cc { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
        .cn { position:absolute; top:-20px; border-radius:3px; }
        @keyframes cnFall {
            0%  { transform: translateY(-20px) rotate(0deg); opacity:1; }
            100%{ transform: translateY(110vh) rotate(var(--rot,720deg)); opacity:0; }
        }

        /* ─── COMPLIMENT ─── */
        .compliment {
            position: fixed;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; font-style:italic;
            color: #ff6b8a;
            pointer-events:none; z-index:160;
            text-shadow: 0 0 20px #ff6b8a;
            animation: complFloat 3.5s ease-out forwards;
            white-space: nowrap;
        }
        @keyframes complFloat {
            0%  { opacity:0; transform:translateY(0) scale(0.6); }
            20% { opacity:1; transform:translateY(-24px) scale(1); }
            80% { opacity:1; transform:translateY(-90px) scale(1); }
            100%{ opacity:0; transform:translateY(-130px) scale(0.85); }
        }

        /* ─── PULSE HEART ─── */
        .ph {
            position:fixed; pointer-events:none; z-index:150;
            animation: phAnim 1.8s ease-out forwards;
        }
        @keyframes phAnim {
            0%  { transform:scale(0); opacity:1; }
            50% { transform:scale(1.6); opacity:0.8; }
            100%{ transform:scale(2.2); opacity:0; }
        }

        @keyframes fadeUp {
            from{ opacity:0; transform:translateY(20px); }
            to  { opacity:1; transform:translateY(0); }
        }

        /* ─── MOBILE ─── */
        @media(max-width:600px){
            .name-tag{ font-size:2.8rem; }
            .card{ padding:36px 22px 32px; }
            .msg{ font-size:1.05rem; }
            
            /* Gift box — все элементы пропорционально уменьшены с коэффициентом 0.8 */
            .gift-box{ 
                width:160px; 
                height:160px;
            }
            .box-base{ 
                width: 160px;
                height: 124px;
            }
            .ribbon-v{ 
                width: 32px;
                height: 124px; 
            }
            .ribbon-h{ 
                top: 44px;
                width: 160px; 
                height: 32px;
            }
            .box-lid{ 
                left: -6px;
                width: 173px;
                height: 54px;
            }
            .lid-ribbon{ 
                width: 32px; 
                height: 54px; 
            }
            .bow{ 
                top: -30px;
            }
            .bow-loop{ 
                width: 38px;
                height: 30px;
            }
            .bow-loop.left  { left: -27px; }
            .bow-loop.right { right: -27px; }
            .bow-center{ 
                width: 18px;
                height: 18px; 
                top: 6px;
            }
            .heart-inside{ 
                font-size: 51px;
            }
            
            .hint{ font-size:0.9rem; }
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="stars" id="stars"></div>
    <div class="cc" id="cc"></div>

    <div class="container">
        <div class="scene">
            <!-- GIFT -->
            <div class="gift-wrap" id="giftWrap" onclick="openGift()">
                <div class="gift-box" id="giftBox">
                    <div class="box-lid" id="lid">
                        <div class="lid-ribbon"></div>
                        <div class="bow">
                            <div class="bow-loop left"></div>
                            <div class="bow-loop right"></div>
                            <div class="bow-center"></div>
                        </div>
                    </div>
                    <div class="box-base">
                        <div class="ribbon-v"></div>
                        <div class="ribbon-h"></div>
                    </div>
                    <div class="heart-inside"></div>
                </div>

                <div class="floating-hearts">
                    <span class="fh" style="top:-28px;left:-18px;animation-delay:0s"></span>
                    <span class="fh" style="top:-18px;right:-22px;animation-delay:0.7s"></span>
                    <span class="fh" style="bottom:-22px;left:-12px;animation-delay:1.2s"></span>
                    <span class="fh" style="bottom:-28px;right:-18px;animation-delay:1.8s"></span>
                </div>
            </div>

            <p class="hint" id="hint"> Нажми, чтобы открыть </p>
        </div>
    </div>

    <!-- GREETING -->
    <div class="greeting" id="greeting">
        <div class="card" id="greetingCard">
            <div class="orb orb1"></div>
            <div class="orb orb2"></div>
            <div class="orb orb3"></div>

            <span class="title-happy">С Днём Рождения,</span>
            <div class="title-row">
                <span class="name-tag">Арина!</span>
            </div>

            <span class="sig1">💖</span>

            <p class="msg">
                <span class="line">Сегодня весь мир ярче,</span>
                <span class="line">потому что в нём есть ты.</span>
                <span class="line">Желаю счастья, здоровья</span>
                <span class="line">тепла, улыбок и исполнения желаний.</span>
                <span class="line">(и что бы в радике меньше заебывали)</span>
                <span class="line">Ты лучшее что было с мной!</span>
            </p>
            <p class="sig">С любовью и заботой 💖</p>
        </div>
    </div>

    <script>
        /* ─── STARS ─── */
        const starsEl = document.getElementById('stars');
        for(let i=0;i<180;i++){
            const s=document.createElement('div');
            s.className='star';
            const sz=Math.random()*2.5+0.5;
            s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
            starsEl.appendChild(s);
        }

        /* ─── CURSOR ─── */
        const cur=document.getElementById('cursor');
        let mx=0,my=0;
        const trailColors=['#f5c842','#ff4fa3','#ff6b8a','#b57bff','#ff9d42','#ffe88a'];
        let lastTrail=0;

        document.addEventListener('mousemove',(e)=>{
            mx=e.clientX; my=e.clientY;
            cur.style.left=mx+'px'; cur.style.top=my+'px';
            const now=Date.now();
            if(now-lastTrail<40) return;
            lastTrail=now;
            const t=document.createElement('div');
            t.className='cursor-trail';
            const col=trailColors[Math.floor(Math.random()*trailColors.length)];
            t.style.cssText=`left:${mx}px;top:${my}px;width:10px;height:10px;background:${col};box-shadow:0 0 12px ${col};`;
            document.body.appendChild(t);
            setTimeout(()=>t.remove(),800);
        });

        /* ─── STATE ─── */
        let opened=false;
        const giftBox=document.getElementById('giftBox');
        const giftWrap=document.getElementById('giftWrap');
        const greeting=document.getElementById('greeting');
        const greetingCard=document.getElementById('greetingCard');
        const hint=document.getElementById('hint');
        const cc=document.getElementById('cc');

        /* ─── OPEN GIFT ─── */
        function openGift(){
            if(opened) return;
            opened=true;
            giftBox.classList.add('shake');
            setTimeout(()=>{
                giftBox.classList.remove('shake');
                giftBox.classList.add('opened');
                setTimeout(()=>{
                    greeting.classList.add('visible');
                    giftWrap.style.transition='opacity 0.5s,transform 0.5s';
                    giftWrap.style.opacity='0';
                    giftWrap.style.transform='scale(0.4)';
                    giftWrap.style.pointerEvents='none';
                    hint.style.opacity='0';
                    burst();
                    makeConfetti();
                    setTimeout(()=>{ autoFirework(); scheduleCompliment(); },1200);
                },700);
            },500);
        }

        /* ─── CONFETTI ─── */
        function makeConfetti(){
            const cols=['#f5c842','#ff4fa3','#ff6b8a','#b57bff','#ff9d42','#4fffb0','#ff6b6b','#fff'];
            for(let i=0;i<140;i++){
                setTimeout(()=>{
                    const d=document.createElement('div');
                    d.className='cn';
                    const w=8+Math.random()*10, h=8+Math.random()*10;
                    const col=cols[Math.floor(Math.random()*cols.length)];
                    const rot=Math.random()*900-450;
                    d.style.cssText=`left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${col};--rot:${rot}deg;animation:cnFall ${3+Math.random()*4}s linear forwards;border-radius:${Math.random()>0.5?'50%':'3px'};opacity:0.9;`;
                    cc.appendChild(d);
                    setTimeout(()=>d.remove(),7000);
                },i*25);
            }
        }

        /* ─── FIREWORK ─── */
        function burst(x,y){
            x=x||window.innerWidth/2+( Math.random()-0.5)*200;
            y=y||window.innerHeight/2+( Math.random()-0.5)*150;
            const fw=document.createElement('div');
            fw.className='firework';
            fw.style.cssText=`left:${x}px;top:${y}px;`;
            const cols=['#f5c842','#ff4fa3','#ff6b8a','#b57bff','#ff9d42','#4fffb0','#ff6b6b','#fff'];
            for(let i=0;i<28;i++){
                const p=document.createElement('div');
                p.className='fw-p';
                const a=(i/28)*Math.PI*2;
                const v=80+Math.random()*60;
                p.style.cssText=`--tx:${Math.cos(a)*v}px;--ty:${Math.sin(a)*v}px;background:${cols[Math.floor(Math.random()*cols.length)]};`;
                fw.appendChild(p);
            }
            document.body.appendChild(fw);
            setTimeout(()=>fw.remove(),900);
            pulseHeart(x,y);
        }

        function autoFirework(){
            if(!opened) return;
            const x=window.innerWidth*0.15+Math.random()*window.innerWidth*0.7;
            const y=window.innerHeight*0.1+Math.random()*window.innerHeight*0.5;
            burst(x,y);
            setTimeout(autoFirework,2500+Math.random()*3000);
        }

        /* ─── PULSE HEART ─── */
        function pulseHeart(x,y){
            const h=document.createElement('div');
            h.className='ph';
            h.style.cssText=`left:${x}px;top:${y}px;font-size:${20+Math.random()*30}px;`;
            document.body.appendChild(h);
            setTimeout(()=>h.remove(),1800);
        }

        /* ─── COMPLIMENTS ─── */
        const compliments=['Ты лучшая!','Ты чудо!','Ты неповторимая!'];
        let ci=0;
        function showCompliment(){
            const c=document.createElement('div');
            c.className='compliment';
            c.textContent=compliments[ci++ % compliments.length];
            c.style.cssText=`left:${10+Math.random()*70}%;top:${20+Math.random()*50}%;`;
            document.body.appendChild(c);
            setTimeout(()=>c.remove(),3500);
        }
        function scheduleCompliment(){
            showCompliment();
            setTimeout(scheduleCompliment,4000+Math.random()*3000);
        }

        /* ─── CLICK on card ─── */
        greetingCard.addEventListener('click',(e)=>{ burst(e.clientX,e.clientY); });
        document.addEventListener('click',(e)=>{
            if(!opened) return;
            if(e.target.closest('.card')) return;
            pulseHeart(e.clientX,e.clientY);
        });

        /* ─── TOUCH ─── */
        giftWrap.addEventListener('touchstart',(e)=>{ e.preventDefault(); openGift(); },{passive:false});
        document.addEventListener('touchmove',(e)=>{
            if(!opened) return;
            const t=e.touches[0];
            const now=Date.now();
            if(now-lastTrail<50) return;
            lastTrail=now;
            const tr=document.createElement('div');
            tr.className='cursor-trail';
            const col=trailColors[Math.floor(Math.random()*trailColors.length)];
            tr.style.cssText=`left:${t.clientX}px;top:${t.clientY}px;width:12px;height:12px;background:${col};box-shadow:0 0 14px ${col};`;
            document.body.appendChild(tr);
            setTimeout(()=>tr.remove(),800);
        },{passive:true});
    </script>
</body>
</html>
